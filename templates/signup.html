<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your PhishGuard AI account">
    <title>Sign Up — PhishGuard AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body data-page="signup">

    <div class="auth-container">
        <div class="particles" id="auth-particles"></div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">🚀</div>
                <h1>Create Account</h1>
                <p>Join PhishGuard AI and start detecting threats</p>
            </div>

            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" id="username" class="form-input" placeholder="Choose a username" required
                        minlength="3" autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com" required
                        autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required
                        minlength="6" autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="Re-enter your password"
                        required autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-full mt-2">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>createParticles('auth-particles', 25);</script>
</body>

</html>
